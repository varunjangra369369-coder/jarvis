name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull your code from GitHub
      - uses: actions/checkout@v4

      # 2. Set up Python so we can run our configuration script
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 3. Generate and edit the buildozer.spec file using your script
      - name: Create and Configure Spec File
        run: |
          pip install buildozer
          buildozer init
          python configure_spec.py

      # 4. Cache Buildozer directories (keeps future builds fast)
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: .buildozer_global
          key: buildozer-global-${{ hashFiles('buildozer.spec') }}

      # 5. Build the APK using the YouTuber's Buildozer Action
      - name: Build with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: master

      # 6. Upload the finished APK so you can download it to your phone
      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-Android-APK
          path: ${{ steps.buildozer.outputs.filename }}
