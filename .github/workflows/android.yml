name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull your code from your repository
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Prepare Python 3.10
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Download the exact system build packages required by Buildozer
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo6 \
          cmake \
          libffi-dev \
          libssl-dev

    # 4. Install Buildozer, Cython, and virtualenv on the runner host
    - name: Install Buildozer dependencies
      run: |
        pip install --upgrade pip
        pip install "cython<3.0.0" buildozer virtualenv

    # 5. Generate the buildozer.spec file
    - name: Generate Spec File
      run: buildozer init

    # 6. Configure Spec File using your configure_spec.py script
    - name: Configure Spec File
      run: python configure_spec.py

    # 7. Compile the Android APK directly on the host (No Docker wrapper)
    - name: Build APK with Buildozer
      run: |
        export PATH=$PATH:~/.local/bin/
        export APP_ANDROID_ACCEPT_SDK_LICENSE=1
        export BUILDOZER_WARN_ON_ROOT=0
        buildozer android debug
      env:
        ACCEPT_SDK_LICENSE: "y"

    # 8. Upload the finished APK to the Artifacts section
    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Jarvis-Android-APK
        path: bin/*.apk
