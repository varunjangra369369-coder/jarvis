name: Build Android APK

on:
  push:
    branches: [ main ]  # Runs every time you push to the main branch

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev distutils python3-setuptools git zip unzip openjdk-17-jdk

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        # "cython<3.0.0" is used here to avoid compilation issues with certain p4a dependencies
        pip install "cython<3.0.0" buildozer

    - name: Generate Spec File
      run: buildozer init

    - name: Configure Spec File for Flask & WebView
      run: |
        # Injects pyjnius along with python3, kivy, and flask
        sed -i 's/^requirements = .*/requirements = python3, kivy, pyjnius, flask, requests/' buildozer.spec
        # Injects the broad storage permissions you need for local file handling
        sed -i 's/^#android.permissions = .*/android.permissions = INTERNET, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE, MANAGE_EXTERNAL_STORAGE/' buildozer.spec
        # Locks API targeting to version 33 for modern compatibility
        sed -i 's/^#android.api = .*/android.api = 33/' buildozer.spec

    - name: Build APK with Buildozer
      run: buildozer android debug
      env:
        ACCEPT_SDK_LICENSE: "y"

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Jarvis-Android-APK
        path: bin/*.apk
