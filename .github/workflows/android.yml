name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libffi-dev distutils python3-setuptools git zip unzip openjdk-17-jdk

    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer cython git+https://github.com

    - name: Generate Spec File
      run: buildozer init

    - name: Configure Spec File for Flask
      run: |
        # This replaces the default requirements with Python, Kivy, and Flask automatically
        sed -i 's/^requirements = .*/requirements = python3, kivy, flask, requests/' buildozer.spec
        # This injects the broad storage permissions you need for local file handling
        sed -i 's/^#android.permissions = .*/android.permissions = READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE, MANAGE_EXTERNAL_STORAGE/' buildozer.spec

    - name: Build APK with Buildozer
      run: buildozer android debug
      env:
        ACCEPT_SDK_LICENSE: "y"

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Jarvis-Android-APK
        path: bin/*.apk
